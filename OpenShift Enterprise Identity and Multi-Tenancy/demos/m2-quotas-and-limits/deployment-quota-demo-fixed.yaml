apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-demo-fixed
  namespace: team-a-dev-quota
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quota-demo-fixed
  template:
    metadata:
      labels:
        app: quota-demo-fixed
    spec:
      containers:
        - name: web
          image: ghcr.io/rummens/pluralsight-globomantics-website:v3
          resources:
            requests:
              cpu: "500m"
              memory: 128Mi
