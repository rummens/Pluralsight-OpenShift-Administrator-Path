apiVersion: batch/v1
kind: CronJob
metadata:
  name: ldap-group-syncer
  namespace: ldap-sync
spec:
  schedule: "*/15 * * * *"   # every 15 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ldap-group-syncer
          restartPolicy: Never
          containers:
          - name: sync
            image: registry.redhat.io/openshift4/ose-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              oc adm groups sync \
                --sync-config=/etc/ldap-sync/ldap-sync.yaml \
                --confirm
            volumeMounts:
            - name: ldap-sync
              mountPath: /etc/ldap-sync
              readOnly: true
          volumes:
          - name: ldap-sync
            configMap:
              name: ldap-sync-config