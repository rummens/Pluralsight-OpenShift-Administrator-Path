apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: middleware-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      containers:
        - name: website
          image: ghcr.io/rummens/pluralsight-globomantics-website:v3
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: middleware-dev
spec:
  selector:
    app: website
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: website
  namespace: middleware-dev
spec:
  to:
    kind: Service
    name: website
  port:
    targetPort: 8080